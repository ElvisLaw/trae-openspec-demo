<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最简单的日历</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>最简单的日历</h1>
        
        <div class="calendar">
            <!-- 日历头部 -->
            <div class="calendar-header">
                <button id="prev-month" class="nav-btn">&lt;</button>
                <h2 id="current-month-year"></h2>
                <button id="next-month" class="nav-btn">&gt;</button>
            </div>
            
            <!-- 星期标题 -->
            <div class="weekdays">
                <div>日</div>
                <div>一</div>
                <div>二</div>
                <div>三</div>
                <div>四</div>
                <div>五</div>
                <div>六</div>
            </div>
            
            <!-- 日期网格 -->
            <div class="days" id="days-grid">
                <!-- 日期将通过 JavaScript 动态添加 -->
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
